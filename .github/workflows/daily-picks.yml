name: Generate Daily Picks

on:
  schedule:
    # 1 PM ET (EDT=UTC-4) = 17:00 UTC. GitHub Actions can be queued 5-30 min,
    # so picks typically land between 1:00 and 1:30 PM ET.
    - cron: '0 17 * * *'
  workflow_dispatch: # Allow manual runs from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit daily-picks.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate picks
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node generate-picks.mjs

      - name: Commit and push daily-picks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add daily-picks.json
          if [ -f picks-archive.json ]; then git add picks-archive.json; fi
          git diff --staged --quiet || (git commit -m "chore: daily picks $(date -u +%Y-%m-%d) [skip ci]" && git push)
