name: Generate Daily Picks

on:
  schedule:
    # 8 AM ET — UTC-5 in winter, UTC-4 in summer. Using 13:00 UTC (8 AM EST).
    # During EDT (summer), this runs at 9 AM ET. Acceptable window.
    - cron: '0 13 * * *'
  workflow_dispatch: # Allow manual runs from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit daily-picks.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate picks
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node generate-picks.mjs

      - name: Commit and push daily-picks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-picks.json
          git diff --staged --quiet || (
            git commit -m "chore: daily picks $(date -u +%Y-%m-%d) [skip ci]" &&
            git pull --rebase &&
            git push
          )
